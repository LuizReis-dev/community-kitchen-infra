name: Pipeline backend
run-name: Executada por ${{ github.actor }}

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Dependencies
        working-directory: api
        run: npm ci

      - name: Build
        working-directory: api
        run: npm run build

  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Dependencies
        working-directory: api
        run: npm ci

      - name: Run Unit Tests
        working-directory: api
        run: npm test -- --runInBand
