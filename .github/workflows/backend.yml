name: Pipeline backend
run-name: Executada por ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente para deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - prod
          - homolog

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: community-kitchen-eks
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'all' }}
  API_IMAGE_NAME: community-kitchen-api

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Dependencies
        working-directory: api
        run: npm ci

      - name: Build
        working-directory: api
        run: npm run build

  unit-tests:
    name: Testes Unitarios
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Dependencies
        working-directory: api
        run: npm ci

      - name: Run Unit Tests
        working-directory: api
        run: npm test -- --runInBand

  deploy:
    name: Build Docker e deploy no EKS
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout infra
        uses: actions/checkout@v5

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem da API
        run: |
          docker build \
            -f applications/backend/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:latest \
            api

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:latest

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Configurar Helm
        uses: azure/setup-helm@v4

      - name: Configurar kubeconfig do EKS
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Instalar Ansible
        run: python -m pip install ansible

      - name: Instalar addons do EKS
        working-directory: ansible
        run: ansible-playbook playbooks/install-eks-addons.yml

      - name: Deploy no Kubernetes com Ansible
        working-directory: ansible
        run: >
          ansible-playbook playbooks/deploy-kubernetes.yml
          -e deploy_environment=${{ env.DEPLOY_ENVIRONMENT }}
          -e api_image=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
