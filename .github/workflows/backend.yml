name: Pipeline backend
run-name: Executada por ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente para deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - prod
          - homolog

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: community-kitchen-eks
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'all' }}
  API_IMAGE_NAME: community-kitchen-api

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Dependencies
        working-directory: api
        run: npm ci

      - name: Build
        working-directory: api
        run: npm run build

  unit-tests:
    name: Testes Unitarios
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install Dependencies
        working-directory: api
        run: npm ci

      - name: Run Unit Tests
        working-directory: api
        run: npm test -- --runInBand

  sonar:
    name: Analise de qualidade da API
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout API
        uses: actions/checkout@v5
        with:
          repository: LuizReis-dev/community-kitchen
          path: api
          fetch-depth: 0

      - name: Iniciar SonarQube local
        run: |
          sudo sysctl -w vm.max_map_count=262144
          docker run -d --name sonarqube -p 9000:9000 sonarqube:lts-community

          for i in {1..60}; do
            if curl -fsS http://localhost:9000/api/system/status | grep -q '"status":"UP"'; then
              exit 0
            fi
            sleep 5
          done

          docker logs sonarqube
          exit 1

      - name: Gerar token temporario de analise
        run: |
          SONAR_PASSWORD='passowrd'

          curl -fsS -u admin:admin -X POST http://localhost:9000/api/users/change_password \
            -d "login=admin" \
            -d "previousPassword=admin" \
            -d "password=${SONAR_PASSWORD}"

          SONAR_TOKEN=$(curl -fsS -u "admin:${SONAR_PASSWORD}" -X POST http://localhost:9000/api/user_tokens/generate \
            -d "name=github-actions-${GITHUB_RUN_ID}" | sed -E 's/.*"token":"([^"]+)".*/\1/')

          echo "SONAR_TOKEN=${SONAR_TOKEN}" >> "$GITHUB_ENV"

      - name: Analisar codigo da API
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: api
          args: >
            -Dsonar.projectKey=community-kitchen-api
            -Dsonar.projectName="Community Kitchen API"
            -Dsonar.sources=src
            -Dsonar.tests=test
            -Dsonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
            -Dsonar.exclusions=dist/**,node_modules/**,coverage/**
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Validar gate de qualidade da API
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: api/.scannerwork/report-task.txt
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

  docker:
    name: Empacotar e publicar API
    runs-on: ubuntu-latest
    needs: [unit-tests, sonar]

    steps:
      - name: Checkout infra
        uses: actions/checkout@v5

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: LuizReis-dev/community-kitchen
          path: api

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem da API
        run: |
          docker build \
            -f applications/backend/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:latest \
            api

      - name: Verificar vulnerabilidades da imagem da API
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push da imagem da API
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:latest

  deploy:
    name: Deploy no EKS
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout infra
        uses: actions/checkout@v5

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Configurar Helm
        uses: azure/setup-helm@v4

      - name: Configurar kubeconfig do EKS
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Instalar Ansible
        run: python -m pip install ansible

      - name: Instalar addons do EKS
        working-directory: ansible
        run: ansible-playbook playbooks/install-eks-addons.yml

      - name: Deploy no Kubernetes com Ansible
        working-directory: ansible
        run: >
          ansible-playbook playbooks/deploy-kubernetes.yml
          -e deploy_environment=${{ env.DEPLOY_ENVIRONMENT }}
          -e api_image=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          -e remote_token_validator_url=${{ secrets.REMOTE_TOKEN_VALIDATOR_URL }}
