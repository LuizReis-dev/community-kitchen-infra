name: Pipeline frontend
run-name: Executada por ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      frontend_image:
        description: Imagem Docker do frontend
        required: true
        default: reisluiz/community-kitchen-frontend:latest

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v5
        with:
          repository: Lucas-Cast/community-kitchen-portal
          path: frontend

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

  push-image:
    name: Push imagem Docker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout infra
        uses: actions/checkout@v5

      - name: Checkout frontend
        uses: actions/checkout@v5
        with:
          repository: Lucas-Cast/community-kitchen-portal
          path: frontend

      - name: Login no Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Build da imagem Docker
        env:
          NEXT_PUBLIC_CK_API_URI: http://${{ secrets.IP_GATEWAY }}/api/
          NEXT_PUBLIC_USER_CONTROLLER_API_URI: ${{ secrets.USER_CONTROLLER_API_URI }}
        run: |
          : "${NEXT_PUBLIC_CK_API_URI:?Secret IP_GATEWAY nao configurado}"
          : "${NEXT_PUBLIC_USER_CONTROLLER_API_URI:?Secret USER_CONTROLLER_API_URI nao configurado}"

          docker build \
            -f applications/frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_CK_API_URI="$NEXT_PUBLIC_CK_API_URI" \
            --build-arg NEXT_PUBLIC_USER_CONTROLLER_API_URI="$NEXT_PUBLIC_USER_CONTROLLER_API_URI" \
            -t "${{ inputs.frontend_image }}" \
            frontend

      - name: Push da imagem no Docker Hub
        run: docker push "${{ inputs.frontend_image }}"

  deploy:
    name: Deploy com Ansible
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.VM_SSH_PRIVATE_KEY }}' | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

      - name: Configurar IP do frontend
        working-directory: ansible
        run: sed -i "s/IP_FRONTEND/${{ secrets.IP_FRONTEND }}/g" hosts.ini

      - name: Executar deploy
        working-directory: ansible
        run: |
          ansible-playbook playbooks/deploy-frontend.yml \
            --extra-vars "frontend_image=${{ inputs.frontend_image }} gateway_public_ip=${{ secrets.IP_GATEWAY }} user_controller_api_uri=${{ secrets.USER_CONTROLLER_API_URI }}"
