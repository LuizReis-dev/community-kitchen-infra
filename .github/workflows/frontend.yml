name: Pipeline frontend
run-name: Executada por ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      frontend_image:
        description: Imagem Docker do frontend
        required: true
        default: reisluiz/community-kitchen-frontend:latest

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v5
        with:
          repository: Lucas-Cast/community-kitchen-portal
          path: frontend

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

  sonar:
    name: Analise de qualidade do frontend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v5
        with:
          repository: Lucas-Cast/community-kitchen-portal
          path: frontend
          fetch-depth: 0

      - name: Iniciar SonarQube local
        run: |
          sudo sysctl -w vm.max_map_count=262144
          docker run -d --name sonarqube -p 9000:9000 sonarqube:lts-community

          for i in {1..60}; do
            if curl -fsS http://localhost:9000/api/system/status | grep -q '"status":"UP"'; then
              exit 0
            fi
            sleep 5
          done

          docker logs sonarqube
          exit 1

      - name: Gerar token temporario de analise
        run: |
          SONAR_PASSWORD='Admin12345!'

          curl -fsS -u admin:admin -X POST http://localhost:9000/api/users/change_password \
            -d "login=admin" \
            -d "previousPassword=admin" \
            -d "password=${SONAR_PASSWORD}"

          SONAR_TOKEN=$(curl -fsS -u "admin:${SONAR_PASSWORD}" -X POST http://localhost:9000/api/user_tokens/generate \
            -d "name=github-actions-${GITHUB_RUN_ID}" | sed -E 's/.*"token":"([^"]+)".*/\1/')

          echo "SONAR_TOKEN=${SONAR_TOKEN}" >> "$GITHUB_ENV"

      - name: Analisar codigo do frontend
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=community-kitchen-frontend
            -Dsonar.projectName="Community Kitchen Frontend"
            -Dsonar.sources=src
            -Dsonar.exclusions=.next/**,node_modules/**,coverage/**
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Validar gate de qualidade do frontend
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: frontend/.scannerwork/report-task.txt
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

  push-image:
    name: Empacotar e publicar frontend
    runs-on: ubuntu-latest
    needs: [build, sonar]

    steps:
      - name: Checkout infra
        uses: actions/checkout@v5

      - name: Checkout frontend
        uses: actions/checkout@v5
        with:
          repository: Lucas-Cast/community-kitchen-portal
          path: frontend

      - name: Login no Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Build da imagem Docker
        env:
          IP_GATEWAY: ${{ secrets.IP_GATEWAY }}
          USER_CONTROLLER_API_URI: ${{ secrets.USER_CONTROLLER_API_URI }}
        run: |
          NEXT_PUBLIC_CK_API_URI="http://${IP_GATEWAY}/api/"
          NEXT_PUBLIC_USER_CONTROLLER_API_URI="$USER_CONTROLLER_API_URI"

          : "${IP_GATEWAY:?Secret IP_GATEWAY nao configurado}"
          : "${NEXT_PUBLIC_USER_CONTROLLER_API_URI:?Secret USER_CONTROLLER_API_URI nao configurado}"
          echo "USER_CONTROLLER_API_URI carregada como secret."

          docker build \
            -f applications/frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_CK_API_URI="$NEXT_PUBLIC_CK_API_URI" \
            --build-arg NEXT_PUBLIC_USER_CONTROLLER_API_URI="$NEXT_PUBLIC_USER_CONTROLLER_API_URI" \
            -t "${{ inputs.frontend_image }}" \
            frontend

      - name: Verificar vulnerabilidades da imagem frontend
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ inputs.frontend_image }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push da imagem no Docker Hub
        run: docker push "${{ inputs.frontend_image }}"

  deploy:
    name: Deploy com Ansible
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Instalar Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.VM_SSH_PRIVATE_KEY }}' | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

      - name: Configurar IP do frontend
        working-directory: ansible
        run: sed -i "s/IP_FRONTEND/${{ secrets.IP_FRONTEND }}/g" hosts.ini

      - name: Executar deploy
        working-directory: ansible
        run: |
          ansible-playbook playbooks/deploy-frontend.yml \
            --extra-vars "frontend_image=${{ inputs.frontend_image }} gateway_public_ip=${{ secrets.IP_GATEWAY }} user_controller_api_uri=${{ secrets.USER_CONTROLLER_API_URI }}"
