[frontend]
app ansible_host=IP_FRONTEND

[frontend:vars]
ansible_user=adminuser
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

[gateway]
kong ansible_host=IP_GATEWAY frontend_upstream_host=IP_FRONTEND_PRIVATE api_upstream_host=API_UPSTREAM_HOST

[gateway:vars]
ansible_user=adminuser
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
