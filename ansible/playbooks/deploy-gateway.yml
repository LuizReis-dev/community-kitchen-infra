---
- name: Rodar Kong Gateway no Docker
  hosts: gateway
  become: true

  vars:
    kong_image: "kong:3"
    container_name: "community-kitchen-gateway"
    kong_config_dir: "/opt/community-kitchen/kong"

  tasks:
    - name: Atualizar cache de pacotes
      apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 120

    - name: Instalar Docker
      apt:
        name: docker.io
        state: present
        lock_timeout: 120

    - name: Iniciar Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Criar diretorio de configuracao do Kong
      file:
        path: "{{ kong_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configurar Kong
      template:
        src: ../../applications/kong/kong.yml.j2
        dest: "{{ kong_config_dir }}/kong.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Baixar imagem do Kong
      command: "docker pull {{ kong_image }}"

    - name: Remover container antigo
      command: "docker rm -f {{ container_name }}"
      ignore_errors: true

    - name: Rodar Kong Gateway
      command: >
        docker run -d
        --name {{ container_name }}
        --restart unless-stopped
        -p 80:8000
        -e KONG_DATABASE=off
        -e KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
        -e KONG_PROXY_ACCESS_LOG=/dev/stdout
        -e KONG_ADMIN_ACCESS_LOG=/dev/stdout
        -e KONG_PROXY_ERROR_LOG=/dev/stderr
        -e KONG_ADMIN_ERROR_LOG=/dev/stderr
        -v {{ kong_config_dir }}/kong.yml:/kong/declarative/kong.yml:ro
        {{ kong_image }}
