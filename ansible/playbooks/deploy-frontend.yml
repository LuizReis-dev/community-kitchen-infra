---
- name: Rodar frontend no Docker
  hosts: frontend
  become: true

  vars:
    frontend_image: "reisluiz/community-kitchen-frontend:latest"
    container_name: "community-kitchen-frontend"
    frontend_env_dir: "/opt/community-kitchen/frontend"
    # URL base da API, sempre passando pelo gateway. Montada a partir do
    # IP publico do gateway (gateway_public_ip) e da rota do ambiente (ck_api_path).
    ck_api_uri: "http://{{ gateway_public_ip }}{{ ck_api_path }}/"
    # URL do servico de controle de usuarios (autenticacao). Vem do secret do
    # GitHub; cai no gateway caso nao seja informada.
    user_controller_api_uri: "{{ ck_api_uri }}"

  tasks:
    - name: Atualizar cache de pacotes
      apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 120

    - name: Instalar Docker
      apt:
        name: docker.io
        state: present
        lock_timeout: 120

    - name: Iniciar Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Criar diretorio de configuracao do frontend
      file:
        path: "{{ frontend_env_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Gerar .env apontando para o gateway na rota do ambiente
      copy:
        dest: "{{ frontend_env_dir }}/.env"
        owner: root
        group: root
        mode: "0644"
        content: |
          NEXT_PUBLIC_CK_API_URI={{ ck_api_uri }}
          NEXT_PUBLIC_USER_CONTROLLER_API_URI={{ user_controller_api_uri }}

    - name: Baixar imagem do frontend
      command: "docker pull {{ frontend_image }}"

    - name: Remover container antigo
      command: "docker rm -f {{ container_name }}"
      ignore_errors: true

    - name: Rodar frontend
      command: >
        docker run -d
        --name {{ container_name }}
        --restart unless-stopped
        -p 80:5000
        --env-file {{ frontend_env_dir }}/.env
        {{ frontend_image }}
