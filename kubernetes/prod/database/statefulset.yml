apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: community-kitchen-postgres
  namespace: prod
  labels:
    app: community-kitchen-postgres
    environment: prod
spec:
  serviceName: community-kitchen-postgres-headless
  replicas: 2
  selector:
    matchLabels:
      app: community-kitchen-postgres
      environment: prod
  template:
    metadata:
      labels:
        app: community-kitchen-postgres
        environment: prod
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: environment
                    operator: In
                    values:
                      - prod
      containers:
        - name: postgres
          image: postgres:17.4-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: community-kitchen-postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
