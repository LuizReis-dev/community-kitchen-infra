apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: community-kitchen-api-ingress
  namespace: homolog
  annotations:
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /homolog/api
            pathType: Prefix
            backend:
              service:
                name: community-kitchen-api
                port:
                  number: 80
