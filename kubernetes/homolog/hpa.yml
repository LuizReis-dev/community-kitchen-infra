apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: community-kitchen-api
  namespace: homolog
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: community-kitchen-api
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
